<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Veille - Logs</title>
    <style>body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;padding:24px}pre{background:#f6f6f6;padding:12px;border-radius:6px}</style>
  </head>
  <body>
    <h1>Logs</h1>
    <pre>{{ '\n'.join(lines) }}</pre>
    <p>
      <a href="./AGENT_MAIL/templates/index.html" onclick="gotoIndex(event)">Retour</a> |
      <a href="./AGENT_MAIL/templates/logs.html" onclick="stopVeille(event)">Arrêter la veille</a>
    </p>

    <script>
      function gotoIndex(e){
        e.preventDefault();
        fetch('/', { method: 'GET' }).then(resp => {
          if(resp.ok) window.location = '/';
          else window.location = './AGENT_MAIL/templates/index.html';
        }).catch(() => { window.location = './AGENT_MAIL/templates/index.html'; });
      }

      function stopVeille(e){
        e.preventDefault();
        fetch('/stop', { method: 'GET' }).then(resp => {
          if(resp.ok) window.location = '/logs';
          else window.location = './AGENT_MAIL/templates/logs.html';
        }).catch(() => { window.location = './AGENT_MAIL/templates/logs.html'; });
      }
    </script>
  </body>
</html>
